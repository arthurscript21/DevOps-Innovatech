name: CI/CD Pipeline - Innovatech

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: devops-u2-cluster   # Nombre del clúster de tu Terraform
  SERVICE_NAME: app                 # Nombre del servicio de tu Terraform

jobs:
  build-and-deploy:
    name: Integracion y Despliegue en AWS ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Configurar Credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================================================
      # COMPILACIÓN Y PUBLICACIÓN DE IMÁGENES
      # =========================================================================
      - name: Build y Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-frontend:latest ./front_despacho
          docker push $ECR_REGISTRY/innovatech-frontend:latest

      - name: Build y Push Backend Ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/innovatech-back-ventas:latest

      - name: Build y Push Backend Despachos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/innovatech-back-despachos:latest

      # =========================================================================
      # DESPLIEGUE NATIVO EN ECS FARGATE (Sin SCP ni SSH)
      # =========================================================================
      - name: Forzar Redespliegue en ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.CLUSTER_NAME }} \
            --service ${{ env.SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Monitorear Estabilidad y Obtener IP Dinamica
        run: |
          echo "Esperando que el servicio de Fargate estabilice las nuevas tareas..."
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER_NAME }} \
            --services ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }}

          TASK_ARN=$(aws ecs list-tasks \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskArns[0]' \
            --output text)

          ENI_ID=$(aws ecs describe-tasks \
            --cluster ${{ env.CLUSTER_NAME }} \
            --tasks $TASK_ARN \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --region ${{ env.AWS_REGION }} \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "=========================================================="
          echo "  🚀 DESPLIEGUE EXITOSO - SISTEMA INNOVATECH"
          echo "=========================================================="
          echo "  URL Frontend:       http://$PUBLIC_IP"
          echo "  Swagger Ventas:     http://$PUBLIC_IP:8081/swagger-ui.html"
          echo "  Swagger Despachos:  http://$PUBLIC_IP:8082/swagger-ui.html"
          echo "=========================================================="