name: CI/CD Pipeline - Distributed EC2

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  # =========================================================================
  # REEMPLAZA ESTAS IPs CON LOS OUTPUTS DE TERRAFORM
  # =========================================================================
  HOST_FRONTEND: 'TU_IP_PUBLICA_FRONTEND'
  HOST_VENTAS: 'TU_IP_PUBLICA_VENTAS'
  HOST_DESPACHOS: 'TU_IP_PUBLICA_DESPACHOS'
  DB_PRIVATE_IP: 'TU_IP_PRIVADA_DATABASE'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------------------------------------------------------
      # COMPILACIÓN Y PUBLICACIÓN EN REPOSITORIOS ECR
      # -------------------------------------------------------------------------
      - name: Build & Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/innovatech-frontend:latest ./front_despacho
          docker push $ECR_REGISTRY/innovatech-frontend:latest
          
          docker build -t $ECR_REGISTRY/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/innovatech-back-ventas:latest
          
          docker build -t $ECR_REGISTRY/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/innovatech-back-despachos:latest

      # -------------------------------------------------------------------------
      # DESPLIEGUE: MICROSERVICIO BACKEND VENTAS (Puerto 8080)
      # -------------------------------------------------------------------------
      - name: Deploy Backend Ventas via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST_VENTAS }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 667130977262.dkr.ecr.us-east-1.amazonaws.com
            docker stop back-ventas || true
            docker rm back-ventas || true
            docker pull 667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest
            docker run -d --name back-ventas -p 8080:8080 \
              -e DB_ENDPOINT=${{ env.DB_PRIVATE_IP }} \
              -e DB_PORT=3306 \
              -e DB_NAME=ventas_db \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=ClaveSegura123 \
              --restart unless-stopped \
              667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest

      # -------------------------------------------------------------------------
      # DESPLIEGUE: MICROSERVICIO BACKEND DESPACHOS (Puerto 8081)
      # -------------------------------------------------------------------------
      - name: Deploy Backend Despachos via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST_DESPACHOS }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 667130977262.dkr.ecr.us-east-1.amazonaws.com
            docker stop back-despachos || true
            docker rm back-despachos || true
            docker pull 667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-despachos:latest
            docker run -d --name back-despachos -p 8081:8081 \
              -e DB_ENDPOINT=${{ env.DB_PRIVATE_IP }} \
              -e DB_PORT=3306 \
              -e DB_NAME=despachos_db \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=ClaveSegura123 \
              --restart unless-stopped \
              667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-despachos:latest

      # -------------------------------------------------------------------------
      # DESPLIEGUE: COMPONENTE FRONTEND (Puerto 80)
      # -------------------------------------------------------------------------
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOST_FRONTEND }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 667130977262.dkr.ecr.us-east-1.amazonaws.com
            docker stop frontend-app || true
            docker rm frontend-app || true
            docker pull 667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
            docker run -d --name frontend-app -p 80:80 \
              --restart unless-stopped \
              667130977262.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest