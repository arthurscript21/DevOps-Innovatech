name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build:
    name: Continuous Integration (Build & Test Cache)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: false
          tags: innovatech-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: false
          tags: innovatech-back-ventas:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: false
          tags: innovatech-back-despachos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Continuous Delivery (Push to ECR & Deploy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/innovatech-frontend:latest ./front_despacho
          docker push $ECR_REGISTRY/innovatech-frontend:latest

      - name: Build and Push Backend Ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/innovatech-back-ventas:latest

      - name: Build and Push Backend Despachos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/innovatech-back-despachos:latest

      # =========================================================================
      # NUEVO PASO: COPIAR EL ARCHIVO DOCKER-COMPOSE.YML A LA EC2
      # =========================================================================
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: '54.242.91.201'
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/backend"

      # =========================================================================
      # EJECUTAR EL DESPLIEGUE DENTRO DEL SERVIDOR VIA SSH
      # =========================================================================
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: '54.242.91.201'
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autenticarse en ECR desde la máquina virtual
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 667130977262.dkr.ecr.us-east-1.amazonaws.com
            
            # Entrar a la carpeta del proyecto
            cd /home/ec2-user/backend
            
            # Crear o asegurar el archivo de variables .env de forma automatizada
            echo "MYSQL_ROOT_PASSWORD=ClaveSegura123" > .env
            
            # Descargar imágenes nuevas, apagar contenedores viejos y encender el stack limpio
            docker compose pull
            docker compose down
            docker compose up -d