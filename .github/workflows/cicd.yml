name: CI/CD Pipeline - Single EC2 Docker Compose

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  # =========================================================================
  # REEMPLAZA ESTA IP CON EL OUTPUT DE TU INSTANCIA ÚNICA DE TERRAFORM
  # =========================================================================
  EC2_HOST: '54.159.23.78' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------------------------------------------------------
      # COMPILACIÓN Y PUBLICACIÓN EN REPOSITORIOS ECR
      # -------------------------------------------------------------------------
      - name: Build & Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/innovatech-frontend:latest ./front_despacho
          docker push $ECR_REGISTRY/innovatech-frontend:latest
          
          docker build -t $ECR_REGISTRY/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/innovatech-back-ventas:latest
          
          docker build -t $ECR_REGISTRY/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/innovatech-back-despachos:latest

      # -------------------------------------------------------------------------
      # TRANSFERENCIA DEL ARCHIVO DOCKER-COMPOSE AL SERVIDOR
      # -------------------------------------------------------------------------
      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/app/"

      # -------------------------------------------------------------------------
      # DESPLIEGUE UNIFICADO USANDO DOCKER COMPOSE EN LA INSTANCIA
      # -------------------------------------------------------------------------
      - name: Deploy Stack via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Asegurar la existencia del directorio de la aplicación
            mkdir -p /home/ec2-user/app
            
            # Crear dinámicamente el archivo .env requerido por el docker-compose
            echo "MYSQL_ROOT_PASSWORD=ClaveSegura123" > /home/ec2-user/app/.env
            
            # Autenticar Docker con el registro ECR de AWS desde la instancia
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 667130977262.dkr.ecr.us-east-1.amazonaws.com
            
            # Moverse al directorio del despliegue, descargar cambios y reiniciar el stack
            cd /home/ec2-user/app/
            docker compose pull
            docker compose up -d --remove-orphans