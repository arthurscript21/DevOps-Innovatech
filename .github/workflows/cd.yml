name: Continuous Deployment

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push - Backend Ventas
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ steps.login-ecr.outputs.registry }}/innovatech-back-ventas:latest

      - name: Build and Push - Backend Despachos
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ steps.login-ecr.outputs.registry }}/innovatech-back-despachos:latest

      - name: Build and Push - Frontend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/innovatech-frontend:latest ./front_despacho
          docker push ${{ steps.login-ecr.outputs.registry }}/innovatech-frontend:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service --cluster devops-u2-cluster --service app --force-new-deployment