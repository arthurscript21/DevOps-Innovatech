name: CI/CD Pipeline a Multi-Instancia AWS

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar las credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- 1. BUILD Y PUSH DE LAS IMÁGENES ---
      
      - name: Build y Push Backend Ventas
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-back-ventas:latest

      - name: Build y Push Backend Despachos
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-back-despachos:latest

      - name: Build y Push Frontend
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-frontend:latest ./front_despacho
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-frontend:latest

      # --- 2. COPIAR DOCKER-COMPOSE A CADA INSTANCIA ---

      - name: Copiar docker-compose a todas las instancias
        uses: appleboy/scp-action@master
        with:
          host: "${{ secrets.IP_VENTAS }},${{ secrets.IP_DESPACHOS }},${{ secrets.IP_FRONTEND }}"
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      # --- 3. DESPLIEGUE POR SERVIDOR ---

      - name: Desplegar en Servidor de Ventas
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IP_VENTAS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker-compose pull back-ventas db-ventas
            docker-compose up -d back-ventas db-ventas
            docker image prune -f

      - name: Desplegar en Servidor de Despachos
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IP_DESPACHOS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker-compose pull back-despachos db-despachos
            docker-compose up -d back-despachos db-despachos
            docker image prune -f

      - name: Desplegar en Servidor de Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IP_FRONTEND }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker-compose pull frontend
            docker-compose up -d frontend
            docker image prune -f