name: Despliegue en AWS EC2

on:
  push:
    branches:
      - deploy # Cambiado a la rama exigida por la rúbrica

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar las credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-session-token: ${{secrets.AWS_SESSION_TOKEN}}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build y Push de imagen backend
        run: |
          docker build --platform linux/amd64 \
          -t ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/devops-u2-backend:latest \
          ./backend
          docker push ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/devops-u2-backend:latest

      - name: Build y Push de imagen frontend
        run: |
          docker build --platform linux/amd64 \
          -t ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/devops-u2-frontend:latest \
          ./frontend
          docker push ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{env.AWS_REGION}}.amazonaws.com/devops-u2-frontend:latest
      
      - name: Despliegue automático en instancia EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autenticarse en ECR desde la instancia EC2
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.us-east-1.amazonaws.com
            
            # Navegar a la carpeta del proyecto (ajusta esta ruta a donde tengas el docker-compose en EC2)
            cd /home/${{ secrets.EC2_USER }}/proyecto
            
            # Descargar las imágenes más recientes y reiniciar servicios
            docker compose pull
            docker compose up -d --remove-orphans