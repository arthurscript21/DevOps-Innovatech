name: CI/CD Pipeline a Multi-Instancia AWS
on:
  push:
    branches: [deploy]
env:
  AWS_REGION: us-east-1
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construcción y Push (Ventas, Despachos, Front)
      - run: |
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest

      - name: Copiar docker-compose
        uses: appleboy/scp-action@master
        with:
          host: "${{ secrets.IP_VENTAS }},${{ secrets.IP_DESPACHOS }},${{ secrets.IP_FRONTEND }},${{ secrets.IP_DATABASE }}"
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      # Despliegue (Repetir para cada servidor usando 'ec2-user')
      - name: Deploy Ventas
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IP_VENTAS }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
            docker compose pull back-ventas
            docker compose up -d back-ventas