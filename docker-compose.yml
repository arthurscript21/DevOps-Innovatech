services:
  back-ventas:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-ventas:3306/ventas_db
    networks:
      - backend-net

  back-despachos:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-despachos:latest
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-despachos:3306/despachos_db
    networks:
      - backend-net

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
    ports:
      - "80:80"
    networks:
      - backend-net



volumes:
  ventas_data:
  despachos_data:

networks:
  backend-net:
    driver: bridge