services:
  # --- BASES DE DATOS ---
  db-ventas:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ventas_db
    volumes:
      - ventas_data:/var/lib/mysql
    networks:
      - backend-net

  db-despachos:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=despachos_db
    volumes:
      - despachos_data:/var/lib/mysql
    networks:
      - backend-net

  # --- APLICACIONES ---
  back-ventas:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-ventas:latest
    depends_on:
      - db-ventas
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-ventas:3306/ventas_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    networks:
      - backend-net

  back-despachos:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-back-despachos:latest
    depends_on:
      - db-despachos
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-despachos:3306/despachos_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    networks:
      - backend-net

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
    ports:
      - "80:80"
    networks:
      - backend-net

volumes:
  ventas_data:
  despachos_data:

networks:
  backend-net:
    driver: bridge