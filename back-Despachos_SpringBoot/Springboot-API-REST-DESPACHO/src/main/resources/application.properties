spring.application.name=Springboot-API-REST-DESPACHOS

server.port=8081

spring.web.allow-cors=true

# =========================
# MYSQL
# =========================

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:innovatech}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:ClaveSegura123}

spring.datasource.platform=mysql

# =========================
# HIKARI
# =========================

spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=60000
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.connectionTestQuery=SELECT 1

# =========================
# JPA / HIBERNATE
# =========================

spring.jpa.database=mysql

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true

spring.sql.init.continue-on-error=true

# =========================
# ACTUATOR
# =========================

management.endpoints.web.exposure.include=health

management.endpoint.health.show-details=always

management.endpoint.health.probes.enabled=true

# =========================
# SWAGGER
# =========================

springdoc.swagger-ui.path=/swagger-ui.html