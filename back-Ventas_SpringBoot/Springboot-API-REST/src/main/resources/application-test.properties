# src/test/resources/application-test.properties
# Configuraci�n de H2 para pruebas
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hikari (evita caída si DB tarda en responder)
spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=60000
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.connectionTestQuery=SELECT 1

# Evita fallo si DB aún no está lista
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Configuraci�n de JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola H2 (opcional, para acceso web a la BD)
spring.h2.console.enabled=true